name: Deploy webben till GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Låt bara en Pages-deploy köra i taget.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publicera Blazor WASM
        run: dotnet publish src/Fubkalkylator.Web/Fubkalkylator.Web.csproj -c Release -o dist

      - name: Fixa för GitHub Pages (base href, SPA-fallback, .nojekyll)
        run: |
          # Undermapp på Pages: https://5ynchronized.github.io/Fubkalkylator/
          # (Har du eget domännamn på roten — ta bort sed-raden.)
          sed -i 's|<base href="/" />|<base href="/Fubkalkylator/" />|' dist/wwwroot/index.html
          # SPA-fallback så /order, /loggbok m.m. funkar vid direktladdning/refresh.
          cp dist/wwwroot/index.html dist/wwwroot/404.html
          # Annars strippar Jekyll bort _framework/ och appen blir en vit sida.
          touch dist/wwwroot/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
