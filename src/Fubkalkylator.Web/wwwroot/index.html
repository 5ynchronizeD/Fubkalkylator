<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f3d2b" />
    <title>Fubkalkylator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="_content/Fubkalkylator.UI/css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Fubkalkylator.Web.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <script>
        // Sätt sparat tema direkt (före Blazor laddar) för att undvika flimmer.
        window.themeInit = function () {
            var t = localStorage.getItem('theme')
                || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
            return t;
        };
        window.setTheme = function (t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        };
        // Enkel nyckel-värde-lagring för appinställningar (sågspår m.m.).
        window.appStore = {
            get: function (k) { return localStorage.getItem(k); },
            set: function (k, v) { localStorage.setItem(k, v); }
        };
        window.themeInit();
    </script>
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
