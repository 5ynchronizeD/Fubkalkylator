<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Fubkalkylator</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/Fubkalkylator.UI/css/app.css" />
    <link rel="stylesheet" href="Fubkalkylator.App.styles.css" />
    <link rel="icon" href="data:,">
    <script>
        // Sätt sparat tema direkt (före Blazor laddar) för att undvika flimmer.
        window.themeInit = function () {
            var t = localStorage.getItem('theme')
                || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
            return t;
        };
        window.setTheme = function (t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        };
        // Enkel nyckel-värde-lagring för appinställningar (sågspår m.m.).
        window.appStore = {
            get: function (k) { return localStorage.getItem(k); },
            set: function (k, v) { localStorage.setItem(k, v); }
        };
        // Läs vald bild från ett file-input, skala ner och returnera som JPEG data-URL.
        window.readResizedImage = function (input, maxDim, quality) {
            return new Promise(function (resolve) {
                var file = input && input.files && input.files[0];
                if (!file) { resolve(null); return; }
                var reader = new FileReader();
                reader.onload = function (e) {
                    var img = new Image();
                    img.onload = function () {
                        var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
                        var cw = Math.round(img.width * scale), ch = Math.round(img.height * scale);
                        var c = document.createElement('canvas'); c.width = cw; c.height = ch;
                        c.getContext('2d').drawImage(img, 0, 0, cw, ch);
                        resolve(c.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = function () { resolve(null); };
                    img.src = e.target.result;
                };
                reader.onerror = function () { resolve(null); };
                reader.readAsDataURL(file);
            });
        };
        // Ladda ner text som fil (export/säkerhetskopia).
        window.downloadText = function (filename, mime, text) {
            var blob = new Blob([text], { type: mime + ';charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        };
        window.themeInit();
    </script>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
